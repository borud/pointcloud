name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  build:
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            binary: pointcloud
            convert-binary: xyz-convert
            cc: gcc
          - os: ubuntu-latest
            arch: arm64
            binary: pointcloud
            convert-binary: xyz-convert
            cc: aarch64-linux-gnu-gcc
            goarch: arm64
          - os: macos-latest
            arch: arm64
            binary: pointcloud
            convert-binary: xyz-convert
            cc: ""
          - os: windows-latest
            arch: amd64
            binary: pointcloud.exe
            convert-binary: xyz-convert.exe
            cc: ""
          - os: windows-latest
            arch: arm64
            binary: pointcloud.exe
            convert-binary: xyz-convert.exe
            cc: ""
            goarch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Install Linux dependencies (amd64)
        if: runner.os == 'Linux' && matrix.arch == 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Install Linux cross-compile dependencies (arm64)
        if: runner.os == 'Linux' && matrix.arch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64

          # Pin existing Ubuntu sources to amd64 only (DEB822 format on 24.04+)
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's/^Architectures:.*/Architectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
            if ! grep -q '^Architectures:' /etc/apt/sources.list.d/ubuntu.sources; then
              sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
            fi
          fi

          # Add arm64 ports repository
          CODENAME=$(lsb_release -cs)
          printf "Types: deb\nURIs: http://ports.ubuntu.com/\nSuites: %s %s-updates\nComponents: main restricted universe multiverse\nArchitectures: arm64\n" "$CODENAME" "$CODENAME" | sudo tee /etc/apt/sources.list.d/arm64-ports.sources

          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libgl1-mesa-dev:arm64 libxkbcommon-dev:arm64 xorg-dev:arm64

      - name: Build pointcloud
        env:
          CGO_ENABLED: "1"
          GOARCH: ${{ matrix.goarch || '' }}
          CC: ${{ matrix.cc || '' }}
        run: |
          go build -ldflags "-X main.Version=dev-${GITHUB_SHA::8}" \
            -o bin/${{ matrix.binary }} .

      - name: Build xyz-convert
        env:
          CGO_ENABLED: "1"
          GOARCH: ${{ matrix.goarch || '' }}
          CC: ${{ matrix.cc || '' }}
        run: |
          go build -ldflags "-X main.Version=dev-${GITHUB_SHA::8}" \
            -o bin/${{ matrix.convert-binary }} ./cmd/xyz-convert

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/
