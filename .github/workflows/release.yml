name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  build:
    needs: lint-and-test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            goos: linux
            binary: pointcloud
            convert-binary: xyz-convert
            cc: gcc
          - os: ubuntu-latest
            arch: arm64
            goos: linux
            binary: pointcloud
            convert-binary: xyz-convert
            cc: aarch64-linux-gnu-gcc
            goarch: arm64
          - os: macos-latest
            arch: arm64
            goos: darwin
            binary: pointcloud
            convert-binary: xyz-convert
            cc: ""
          - os: windows-latest
            arch: amd64
            goos: windows
            binary: pointcloud.exe
            convert-binary: xyz-convert.exe
            cc: ""
          - os: windows-latest
            arch: arm64
            goos: windows
            binary: pointcloud.exe
            convert-binary: xyz-convert.exe
            cc: ""
            goarch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Install Linux dependencies (amd64)
        if: runner.os == 'Linux' && matrix.arch == 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Install Linux cross-compile dependencies (arm64)
        if: runner.os == 'Linux' && matrix.arch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list.d/*.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libgl1-mesa-dev:arm64 libxkbcommon-dev:arm64 xorg-dev:arm64

      - name: Set version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build pointcloud
        env:
          CGO_ENABLED: "1"
          GOARCH: ${{ matrix.goarch || '' }}
          CC: ${{ matrix.cc || '' }}
        run: |
          go build -ldflags "-X main.Version=${{ steps.version.outputs.version }}" \
            -o bin/${{ matrix.binary }} .

      - name: Build xyz-convert
        env:
          CGO_ENABLED: "1"
          GOARCH: ${{ matrix.goarch || '' }}
          CC: ${{ matrix.cc || '' }}
        run: |
          go build -ldflags "-X main.Version=${{ steps.version.outputs.version }}" \
            -o bin/${{ matrix.convert-binary }} ./cmd/xyz-convert

      - name: Create archive
        shell: bash
        run: |
          cd bin
          ARCHIVE="pointcloud-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.arch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a "../${ARCHIVE}.zip" .
          else
            tar czf "../${ARCHIVE}.tar.gz" .
          fi

      - name: Upload archive
        uses: actions/upload-artifact@v5
        with:
          name: archive-${{ matrix.goos }}-${{ matrix.arch }}
          path: |
            pointcloud-*.tar.gz
            pointcloud-*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all archives
        uses: actions/download-artifact@v5
        with:
          pattern: archive-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pointcloud-*.tar.gz
            pointcloud-*.zip
